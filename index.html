<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta charset="UTF-8">
<title>Une question pour toi</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
  }
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #eef3e6 0%, #f7f3e8 50%, #eef0e2 100%);
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    position: fixed;
    inset: 0;
  }
 
  /* Feuilles décoratives flottantes en fond */
  .leaf {
    position: fixed;
    font-size: 22px;
    opacity: 0.35;
    animation: float linear infinite;
    pointer-events: none;
    user-select: none;
    z-index: 0;
  }
  @keyframes float {
    0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.35; }
    90% { opacity: 0.35; }
    100% { transform: translateY(110vh) translateX(20px) rotate(200deg); opacity: 0; }
  }
 
  .frame {
    position: relative;
    max-width: 92vw;
    width: 420px;
    z-index: 1;
  }
 
  .card {
    background: #fffdf8;
    border-radius: 4px;
    padding: 2.5rem 2rem 2.25rem;
    text-align: center;
    box-shadow: 0 20px 50px rgba(60, 80, 40, 0.15);
    position: relative;
    border: 1px solid #e3e6d6;
  }
 
  /* Coins décoratifs façon feuillage */
  .card::before, .card::after {
    content: '🌿';
    position: absolute;
    font-size: 1.6rem;
    opacity: 0.7;
  }
  .card::before { top: -14px; left: -10px; transform: rotate(-20deg); }
  .card::after { bottom: -14px; right: -10px; transform: rotate(160deg); }
 
  .eyebrow {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8a9a6f;
    margin-bottom: 0.75rem;
    font-weight: 600;
  }
 
  h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.1rem, 8vw, 2.9rem);
    color: #4a5a3a;
    margin: 0 0 1.5rem;
    line-height: 1.15;
  }
 
  p {
    font-size: clamp(0.88rem, 3.2vw, 0.98rem);
    line-height: 1.7;
    color: #6b7460;
    font-weight: 300;
  }
 
  .divider {
    width: 40px;
    height: 1px;
    background: #b8c4a0;
    margin: 1.25rem auto;
  }
 
  .buttons-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.9rem;
    flex-wrap: nowrap;
    position: relative;
    min-height: 3rem;
    margin-top: 1.75rem;
  }
 
  button {
    padding: 0.75rem 1.7rem;
    font-size: 0.95rem;
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all .25s ease;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
 
  #yesBtn {
    background: #6b8e4e;
    color: #fdfdf8;
  }
  #yesBtn:hover {
    background: #5a7a40;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(107, 142, 78, 0.35);
  }
 
  #noBtn {
    background: transparent;
    color: #a3ab8f;
    border: 1px solid #d3d9c3;
    position: fixed;
    left: 0;
    top: 0;
  }
 
  .petal {
    position: fixed;
    top: -40px;
    font-size: 20px;
    pointer-events: none;
    animation: fall 4.5s linear infinite;
    z-index: 2;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(300deg); opacity: 0; }
  }
</style>
</head>
<body>
<div id="leavesContainer"></div>
 
<div class="frame">
  <div class="card" id="mainCard">
    <div class="eyebrow">Petit mot pour toi</div>
    <h1>Est‑ce que tu voudrais<br>sortir avec moi ?</h1>
    <div class="divider"></div>
    <div class="buttons-row">
      <button id="yesBtn">Avec joie</button>
      <button id="noBtn">Non</button>
    </div>
  </div>
</div>
 
<script>
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const card = document.getElementById('mainCard');
  const body = document.body;
  const leavesContainer = document.getElementById('leavesContainer');
 
  const leafEmojis = ['🌿', '🍃', '🌱'];
 
  function createLeaves() {
    const count = 14;
    for (let i = 0; i < count; i++) {
      const leaf = document.createElement('div');
      leaf.className = 'leaf';
      leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
      leaf.style.left = Math.random() * 100 + 'vw';
      leaf.style.animationDuration = (Math.random() * 8 + 10) + 's';
      leaf.style.animationDelay = (Math.random() * 10) + 's';
      leavesContainer.appendChild(leaf);
    }
  }
  createLeaves();
 
  const petalEmojis = ['🌸', '🌼', '✿'];
  function spawnPetal() {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    petal.style.left = Math.random() * (window.innerWidth - 24) + 'px';
    petal.style.animationDuration = (Math.random() * 2 + 3.5) + 's';
    petal.style.fontSize = (Math.random() * 8 + 16) + 'px';
    body.appendChild(petal);
    setTimeout(() => petal.remove(), 4700);
  }
 
  let petalInterval = null;
 
  yesBtn.addEventListener('click', () => {
    noBtn.style.display = 'none';
    card.innerHTML = `
      <div class="eyebrow">Merci</div>
      <h1>Ça me touche vraiment</h1>
      <div class="divider"></div>
      <p>J'ai hâte de découvrir avec toi de nouveaux endroits, de nouvelles conversations, et de laisser cette histoire pousser tranquillement, comme tout ce qui compte vraiment.</p>
      <p style="margin-top:1rem;">Est‑ce que tu voudrais sortir avec moi ? 🌱</p>
    `;
    petalInterval = setInterval(spawnPetal, 320);
  });
 
  let dodgeCount = 0;
  const maxDodges = 3; // au-delà, le bouton arrête de fuir et devient cliquable
  let hasBeenActivated = false;
 
  function moveNoButton() {
    if (noBtn.style.position !== 'fixed') {
      noBtn.style.position = 'fixed';
    }
    dodgeCount++;
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;
    const margin = 12;
    const maxX = Math.max(margin, window.innerWidth - btnWidth - margin);
    const maxY = Math.max(margin, window.innerHeight - btnHeight - margin);
    const randX = Math.random() * (maxX - margin) + margin;
    const randY = Math.random() * (maxY - margin) + margin;
    noBtn.style.left = `${randX}px`;
    noBtn.style.top = `${randY}px`;
  }
 
  function showNoMessage() {
    card.innerHTML = `
      <div class="eyebrow">Message</div>
      <h1>C'est noté, et ce n'est pas grave</h1>
      <div class="divider"></div>
      <p>Merci d'avoir pris le temps de lire ça jusqu'au bout. Je respecte totalement ta réponse, et j'espère que tu passes une belle journée. 🌿</p>
    `;
  }
 
  // Gestion unifiée : sur ordinateur, le survol fait fuir le bouton.
  // Sur mobile, le premier toucher fait fuir (s'il reste des esquives),
  // sinon le clic déclenche directement le message.
  noBtn.addEventListener('mouseenter', () => {
    if (dodgeCount < maxDodges) {
      moveNoButton();
    }
  });
 
  noBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (dodgeCount < maxDodges) {
      moveNoButton();
    } else {
      showNoMessage();
    }
  });
 
  window.addEventListener('resize', () => {
    if (noBtn.style.position === 'fixed' && dodgeCount > 0 && dodgeCount < maxDodges) {
      moveNoButton();
    }
  });
 
  function initNoButtonPosition() {
    noBtn.style.position = 'static';
  }
  window.addEventListener('load', initNoButtonPosition);
</script>
</body>
</html>
